<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>

    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#mainBack)"/>

  <circle cx="200" cy="150" r="150" fill="#f43f5e" filter="url(#glow)" opacity="0.4"/>
  <circle cx="1000" cy="500" r="200" fill="#fbbf24" filter="url(#glow)" opacity="0.3"/>
  <circle cx="600" cy="315" r="120" fill="#8b5cf6" filter="url(#glow)" opacity="0.3"/>

  <g transform="translate(300, 165)">
    <rect width="600" height="300" rx="40" fill="url(#glass)" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
    
    <rect x="50" y="60" width="120" height="12" rx="6" fill="white" opacity="0.6"/>
    <rect x="50" y="90" width="400" height="30" rx="8" fill="white" opacity="0.9"/>
    <rect x="50" y="140" width="300" height="15" rx="6" fill="white" opacity="0.4"/>
    
    <rect x="50" y="210" width="80" height="40" rx="20" fill="#fbbf24"/>
    <circle cx="530" cy="70" r="30" fill="#f43f5e" opacity="0.8"/>
  </g>

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" />
</svg>
